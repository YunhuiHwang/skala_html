<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>HTML Form Example III</title>
</head>
<body>
  <form>
    <fieldset>
      <legend>자기소개</legend>
      <p>
        <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사: </label><br>
        <textarea id="intro" name="intro" rows="5" cols="50" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
      </p>
    </fieldset>
    <br>
    <input type="submit" value="동의하고 회원 가입">
    <input type="reset" value="다시 작성">
  </form>
</body>
</html>
