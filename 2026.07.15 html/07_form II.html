<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>HTML Form Example II</title>
</head>
<body>
  <form>
    <fieldset>
      <legend>개인 정보</legend>
      <p>
        <label for="userName">이름: </label>
        <input type="text" id="userName" name="userName" required>
      </p>
      <p>
        <label for="userBirth">생일: </label>
        <input type="date" id="userBirth" name="userBirth">
      </p>
      <p>
        성별:
        <label><input type="radio" name="gender" value="male" checked> 남성</label>
        <label><input type="radio" name="gender" value="female"> 여성</label>
        <label><input type="radio" name="gender" value="none"> 선택 안 함</label>
      </p>
      <p>
        관심 분야 (중복 선택 가능): <br>
        <label><input type="checkbox" name="interest" value="frontend"> 프론트엔드 (Vue.js/HTML)</label><br>
        <label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 실무</label><br>
        <label><input type="checkbox" name="interest" value="backend"> 백엔드 & 데이터베이스</label><br>
        <label><input type="checkbox" name="interest" value="devops"> 클라우드 & 인프라</label>
      </p>
    </fieldset>
  </form>
</body>
</html>
