<!--
  [W3Schools] CSS Fonts Code Challenge
  https://www.w3schools.com/css/css_challenges_fonts.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. Set the .serif font-family to "Times New Roman", Times, serif
  2. Set the .sans font-family to Arial, Helvetica, sans-serif
  3. Add a .mono rule: set font-family to "Courier New", Courier, monospace
-->
  

<!doctype html>
<html>
  <head>
    <style>
      .serif {
        /* Times New Roman with fallbacks */
        font-family: "Times New Roman", Times, serif;
      }

      .sans {
        /* Arial with fallbacks */
        font-family: "Arial", Helvetica, sans-serif;
      }

      /* add .mono rule here */
      .mono {
        font-family: "Courier New", Courier, monospace;
      }
    </style>
  </head>
  <body>
    <p class="serif">This is a serif font (Times New Roman).</p>
    <p class="sans">This is a sans-serif font (Arial).</p>
    <p class="mono">This is a monospace font (Courier New).</p>
  </body>
</html>
