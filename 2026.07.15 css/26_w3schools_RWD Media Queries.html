<!--
  [W3Schools] CSS RWD Media Queries Code Challenge
  https://www.w3schools.com/css/css_challenges_rwd_mediaqueries.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. For screens up to 600px: set .column width to 100% inside @media (max-width: 600px)
  2. For screens 601px to 900px: set .column width to 50% inside @media (max-width: 900px)
-->


<!doctype html>
<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
      }

      .row::after {
        content: "";
        display: table;
        clear: both;
      }

      .column {
        float: left;
        width: 25%;
        padding: 15px;
        background-color: #f1f1f1;
        border: 1px solid lightgray;
      }

      /* @media for max-width 900px */
      @media (max-width: 900px) {
        .column {
          width: 50%;
        }
      }
      /* @media for max-width 600px */
      @media (max-width: 600px) {
        .column {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="column">Col 1</div>
      <div class="column">Col 2</div>
      <div class="column">Col 3</div>
      <div class="column">Col 4</div>
    </div>
  </body>
</html>
