<!--
  [W3Schools] CSS Inheritance Code Challenge
  https://www.w3schools.com/css/css_challenges_inheritance.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. Force the link to inherit the parent's color: set .card a color to inherit
  2. Reset the border on .card p to its default: set border to initial
-->
  

<!doctype html>
<html>
  <head>
    <style>
      .card {
        color: dimgray;
        border: 2px solid #04aa6d;
        padding: 15px;
        width: 300px;
      }

      .card a {
        /* color: inherit from parent */
        color: inherit;
      }

      .card p {
        /* border: reset to default */
        border: initial;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h3>CSS Inheritance</h3>
      <p>Links normally don't inherit color. Use <b>inherit</b> to force it.</p>
      <a href="#">This link inherits the card color</a>
    </div>
  </body>
</html>
