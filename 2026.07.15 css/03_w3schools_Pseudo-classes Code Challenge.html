<!doctype html>
<html>
  <head>
    <style>
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        /* background-color, color, border */
        background-color: #04aa6d;
        color: white;
        border: none;
      }

      /* add button:hover rule */
      button:hover {
        background-color: #028a4e;
      }
      /* add input:focus rule */
      input:focus {
        outline: 2px solid #04aa6d;
      }
      /* add p:first-child rule */
      p:first-child {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div>
      <p>This first paragraph should be bold (first-child).</p>
      <p>This paragraph is normal.</p>
    </div>

    <button>Hover over me</button>
    <br /><br />
    <input type="text" placeholder="Click to focus" />
  </body>
</html>
