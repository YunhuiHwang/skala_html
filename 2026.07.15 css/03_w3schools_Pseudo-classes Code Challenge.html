<!--
  [W3Schools] CSS Pseudo-classes Code Challenge
  https://www.w3schools.com/css/css_challenges_pseudo_classes.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. Set the button background-color to #04AA6D, color to white, and border to none
  2. Add a button:hover rule: set background-color to #028a4e
  3. Add an input:focus rule: set outline to 2px solid #04AA6D
  4. Add a p:first-child rule: set font-weight to bold
-->


<!doctype html>
<html>
  <head>
    <style>
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        /* background-color, color, border */
        background-color: #04aa6d;
        color: white;
        border: none;
      }

      /* add button:hover rule */
      button:hover {
        background-color: #028a4e;
      }
      /* add input:focus rule */
      input:focus {
        outline: 2px solid #04aa6d;
      }
      /* add p:first-child rule */
      p:first-child {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div>
      <p>This first paragraph should be bold (first-child).</p>
      <p>This paragraph is normal.</p>
    </div>

    <button>Hover over me</button>
    <br /><br />
    <input type="text" placeholder="Click to focus" />
  </body>
</html>
