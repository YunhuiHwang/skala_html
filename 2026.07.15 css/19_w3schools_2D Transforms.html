<!--
  [W3Schools] CSS 2D Transforms Code Challenge
  https://www.w3schools.com/css/css_challenges_css3_transforms.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. Rotate #rotate by 20deg using transform: rotate(20deg)
  2. Scale #scale to 1.5 times its size using transform: scale(1.5)
  3. Move #translate 50px right and 20px down using transform: translate(50px, 20px)
-->
  

<!doctype html>
<html>
  <head>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: #04aa6d;
        color: white;
        margin: 40px;
        display: inline-block;
        text-align: center;
        line-height: 100px;
      }

      #rotate {
        /* rotate */
        transform: rotate(20deg);
      }

      #scale {
        /* scale */
        transform: scale(1.5);
      }

      #translate {
        /* translate */
        transform: translate(50px, 20px);
      }
    </style>
  </head>
  <body>
    <div id="rotate">Rotate</div>
    <div id="scale">Scale</div>
    <div id="translate">Move</div>
  </body>
</html>
