<!--
  [W3Schools] CSS Colors Code Challenge
  https://www.w3schools.com/css/css_challenges_colors.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. Set the h1 color using a color name: Tomato
  2. Set the h2 color using a hex value: #1e90ff
  3. Set the p color using an rgb value: rgb(60, 179, 113)
-->
  

<!doctype html>
<html>
  <head>
    <style>
      h1 {
        /* color name */
        color: Tomato;
      }

      h2 {
        /* hex value */
        color: #1e90ff;
      }

      p {
        /* rgb value */
        color: rgb(60, 179, 113);
      }
    </style>
  </head>
  <body>
    <h1>Color Name</h1>
    <h2>Hex Value</h2>
    <p>RGB Value</p>
  </body>
</html>
