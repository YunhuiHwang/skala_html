<!--
  [W3Schools] CSS Position Code Challenge
  https://www.w3schools.com/css/css_challenges_position.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. Set the .container position to relative (establishes positioning context)
  2. Set the .badge position to absolute, top to -10px, and right to -10px
-->
  

<!doctype html>
<html>
  <head>
    <style>
      .container {
        width: 200px;
        padding: 20px;
        background-color: #f1f1f1;
        border: 1px solid lightgray;
        /* position */
        position: relative;
      }

      .badge {
        background-color: red;
        color: white;
        padding: 4px 8px;
        border-radius: 50%;
        font-size: 12px;
        /* position, top, right */
        position: absolute;
        top: -10px;
        right: -10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <span class="badge">3</span>
      <p>Notifications</p>
    </div>
  </body>
</html>
