<!--
  [W3Schools] CSS Inline-block Code Challenge
  https://www.w3schools.com/css/css_challenges_inline-block.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. Set .inline display to inline (notice: width/height are ignored)
  2. Set .block display to block (each takes a full row)
  3. Add a .inline-block rule: set display to inline-block, width to 150px, and height to 50px
-->
  

<!doctype html>
<html>
  <head>
    <style>
      span {
        background-color: #04aa6d;
        color: white;
        padding: 5px;
        width: 150px;
        height: 50px;
        margin: 5px;
      }

      .inline {
        /* display */
        display: inline;
      }

      .block {
        /* display */
        display: block;
      }

      /* add .inline-block rule */
      .inline-block {
        display: inline-block;
        width: 150px;
        height: 50px;
      }
    </style>
  </head>
  <body>
    <h3>display: inline</h3>
    <span class="inline">One</span>
    <span class="inline">Two</span>
    <span class="inline">Three</span>

    <h3>display: block</h3>
    <span class="block">One</span>
    <span class="block">Two</span>
    <span class="block">Three</span>

    <h3>display: inline-block</h3>
    <span class="inline-block">One</span>
    <span class="inline-block">Two</span>
    <span class="inline-block">Three</span>
  </body>
</html>
