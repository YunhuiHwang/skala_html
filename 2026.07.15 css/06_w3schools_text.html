<!--
  [W3Schools] CSS Text Code Challenge
  https://www.w3schools.com/css/css_challenges_text.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. Set the body color to dimgray (default text color for the page)
  2. Set the h1 color to green
  3. Add a .highlight rule: set background-color to yellow and color to red
-->
  

<!doctype html>
<html>
  <head>
    <style>
      body {
        /* default text color */
        color: dimgray;
      }

      h1 {
        /* heading color */
        color: green;
      }

      /* add .highlight rule here */
      .highlight {
        background-color: yellow;
        color: red;
      }
    </style>
  </head>
  <body>
    <h1>Text Color</h1>
    <p>The body color sets the default text color for the whole page.</p>
    <p>
      You can also combine
      <span class="highlight">text color with background color</span> for
      emphasis.
    </p>
  </body>
</html>
