<!--
  [W3Schools] CSS Float Code Challenge
  https://www.w3schools.com/css/css_challenges_float.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. Float the img to the left
  2. Add 15px of margin-right to the img so text doesn't touch it
  3. Use clear: both on the footer so it appears below the floated image
-->
  

<!doctype html>
<html>
  <head>
    <style>
      img {
        width: 170px;
        /* float and margin */
        float: left;
        margin-right: 15px;
      }

      footer {
        background-color: lightgray;
        padding: 10px;
        /* clear the float */
        clear: both;
      }
    </style>
  </head>
  <body>
    <h1>Float and Clear</h1>
    <img src="pineapple.jpg" alt="Pineapple" />
    <p>
      The float property places an element to the left or right, allowing text
      to wrap around it. The clear property controls what happens next to
      floated elements.
    </p>

    <footer>Footer - should appear below the image.</footer>
  </body>
</html>
