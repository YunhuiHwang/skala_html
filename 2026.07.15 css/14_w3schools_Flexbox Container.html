<!--
  [W3Schools] CSS Flexbox Container Code Challenge
  https://www.w3schools.com/css/css_challenges_flexbox_container.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. Set the .container justify-content to space-between
  2. Set the .container align-items to center
  3. Set the .container flex-wrap to wrap
-->
  

<!doctype html>
<html>
  <head>
    <style>
      .container {
        display: flex;
        height: 200px;
        background-color: #f1f1f1;
        /* justify-content, align-items, flex-wrap */
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
      }

      .container > div {
        background-color: #04aa6d;
        color: white;
        width: 100px;
        margin: 5px;
        padding: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div>1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
    </div>
  </body>
</html>
