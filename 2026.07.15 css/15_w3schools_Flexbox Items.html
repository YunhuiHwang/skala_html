<!--
  [W3Schools] CSS Flexbox Items Code Challenge
  https://www.w3schools.com/css/css_challenges_flexbox_items.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. Make all .item elements grow equally with flex: 1
  2. Make #main take up twice the space with flex: 2
  3. Give #sidebar an order of -1 to move it first
-->
  

<!doctype html>
<html>
  <head>
    <style>
      .container {
        display: flex;
        gap: 10px;
      }

      .item {
        background-color: #04aa6d;
        color: white;
        padding: 20px;
        text-align: center;
        /* flex: 1 */
        flex: 1;
      }

      #main {
        /* flex: 2 */
        flex: 2;
      }

      #sidebar {
        background-color: dimgray;
        /* order: -1 */
        order: -1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item" id="main">Main Content</div>
      <div class="item" id="sidebar">Sidebar</div>
      <div class="item">Extra</div>
    </div>
  </body>
</html>
