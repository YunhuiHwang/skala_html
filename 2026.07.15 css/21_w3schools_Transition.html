<!--
  [W3Schools] CSS Transitions Code Challenge
  https://www.w3schools.com/css/css_challenges_css3_transitions.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. Add a transition shorthand to the div: width 0.5s, background-color 1s
  2. On hover (div:hover), change the width to 300px
  3. On hover, also change background-color to dodgerblue
-->
  

<!doctype html>
<html>
  <head>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: red;
        color: white;
        text-align: center;
        line-height: 100px;
        /* transition shorthand */
        transition:
          width 0.5s,
          background-color 1s;
      }

      div:hover {
        /* width and background-color */
        width: 300px;
        background-color: dodgerblue;
      }
    </style>
  </head>
  <body>
    <p>Hover over the box to see the transition:</p>
    <div>Hover me</div>
  </body>
</html>
