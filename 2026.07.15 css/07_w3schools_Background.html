<!--
  [W3Schools] CSS Background Code Challenge
  https://www.w3schools.com/css/css_challenges_background.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. Set the body background-color to lightblue
  2. Set the body background-image to url("img_tree.png")
  3. Set the body background-repeat to no-repeat
  4. Set the body background-position to right top
-->
  

<!doctype html>
<html>
  <head>
    <style>
      body {
        /* background-color */
        background-color: lightblue;
        /* background-image */
        background-image: url("img_tree.png");
        /* background-repeat */
        background-repeat: no-repeat;
        /* background-position */
        background-position: right top;
      }
    </style>
  </head>
  <body>
    <h1>CSS Background</h1>
    <p>
      A background color and a background image can be set together. The color
      shows where the image does not cover.
    </p>
  </body>
</html>
