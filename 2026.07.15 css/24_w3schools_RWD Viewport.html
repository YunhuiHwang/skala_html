<!--
  [W3Schools] CSS RWD Viewport Code Challenge
  https://www.w3schools.com/css/css_challenges_rwd_viewport.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. Add the viewport <meta> tag in the <head> section (set width to device-width and initial-scale to 1.0)
  2. Prevent the image from overflowing: set img max-width to 100% and height to auto
  3. Make the content area responsive: set .content width to 100%
-->


<!doctype html>
<html>
  <head>
    <!-- add viewport meta tag here -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      img {
        /* max-width and height */
        max-width: 100%;
        height: auto;
      }

      .content {
        padding: 20px;
        /* width */
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <h1>Responsive Page</h1>
      <p>
        This page uses the viewport meta tag and relative widths to look good on
        all devices.
      </p>
      <img
        src="https://www.w3schools.com/css/img_5terre.jpg"
        alt="Cinque Terre"
      />
    </div>
  </body>
</html>
