<!--
  [W3Schools] How To Add CSS
  https://www.w3schools.com/css/css_challenges_howto.asp
  
  Instructions:
  Inside the editor, complete the following steps:
  1. Add an external stylesheet by inserting a <link> element with rel "stylesheet" and href "mystyle.css"
  2. Add an internal stylesheet: inside the <style> tag, set h1 color to navy
  3. Add an inline style: on the <p> element, set color to red
-->


<!doctype html>
<html>
  <head>
    <!-- add external stylesheet link here -->
    <link rel="stylesheet" href="mystyle.css" />
    <style>
      /* add internal CSS here */
      h1 {
        color: navy;
      }
    </style>
  </head>
  <body>
    <h1>Three Ways to Add CSS</h1>
    <p style="color: red">This paragraph uses inline CSS.</p>
  </body>
</html>
